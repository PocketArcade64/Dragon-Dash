// draw an upgrade's icon (from any image set) centered at (cx,cy) within a square of `size`
function drawUpgradeIcon(icon, cx, cy, size){
  if(!icon){ return; }
  if(icon.src==='heart'){
    // hearts keep native aspect; place centered
    const rec=HEART_IMGS[icon.key];
    const w=size, h=rec&&rec.ready?Math.round(size*rec.h/rec.w):Math.round(size*10/11);
    drawHeartImg(icon.key, cx-w/2, cy-h/2, w);
    return;
  }
  const set = icon.src==='shop' ? SHOP_ICONS : ICONS;
  const rec = set[icon.key];
  if(rec && rec.ready){ ctx.drawImage(rec.img, Math.round(cx-size/2), Math.round(cy-size/2), Math.round(size), Math.round(size)); }
  else { ctx.fillStyle='#9aa3b8'; ctx.beginPath(); ctx.arc(cx,cy,size*0.4,0,7); ctx.fill(); }
}

// shared power-up color map (used by floating power-ups and the HUD timer bars)
const POWERUP_COLORS={shield:'#5BC8F5',magnet:'#E0563B',tiny:'#E74C3C',ghost:'#DCE6F2',coinburst:'#F5C518',slowfield:'#C0C7D0',doublepoints:'#3CEF33'};
function drawPowerup(p){
  const col=POWERUP_COLORS[p.type]||'#fff';
  const R = Math.round((CONFIG.POWERUP_R+5)/PX);          // radius in grid cells
  // snap the center to an integer so the pixel grid is symmetric about it (no jitter, centered)
  const Cx = Math.round(p.x - PX/2), Cy = Math.round(p.y - PX/2);
  ctx.save();
  ctx.globalAlpha=0.16; pixelDot(Cx, Cy, R, col, PX);     // translucent filled disc
  ctx.globalAlpha=0.40; pixelRing(Cx, Cy, R, col, PX, 1); // slightly stronger rim
  ctx.globalAlpha=1;
  drawIcon(p.type, p.x, p.y, 30);
  ctx.restore();
}
function star(cx,cy,r,n){
  ctx.beginPath();
  for(let i=0;i<n*2;i++){ const rr=i%2?r*0.45:r; const a=Math.PI/n*i-Math.PI/2; ctx[i?'lineTo':'moveTo'](cx+Math.cos(a)*rr,cy+Math.sin(a)*rr); }
  ctx.closePath(); ctx.fill();
}

function drawHUD(){
  const t=SAFE_TOP;
  // Hearts (top-left). Bigger and evenly spaced. The row always fits the left HUD zone no
  // matter how many bonus/temp hearts stack up: we pick the largest heart size (capped at
  // HMAX) that fits `total` hearts with a proportional gap, so 3 base hearts plus every
  // possible temp heart fit perfectly without ever colliding with the centered SCORE text.
  const total = Math.max(1, G.maxHearts + G.tempHearts);
  const ZONE_X = 8;
  const ZONE_W = CONFIG.W/2 - 30 - ZONE_X;   // available width before the centered SCORE text
  const HMAX = 26;                            // preferred (big) heart size
  const GAP_RATIO = 0.22;                     // gap as a fraction of heart size
  const denom = total + (total-1)*GAP_RATIO;  // rowWidth = size*denom
  const size = Math.min(HMAX, ZONE_W/denom);
  const step = size*(1+GAP_RATIO);
  const hy = t + 14 - size/2;                 // vertically center the bigger hearts on the SCORE line
  let hx = ZONE_X;
  for(let i=0;i<G.maxHearts;i++){ drawHeartImg(i>=G.hearts?'empty':'full', hx, hy, size); hx+=step; }
  for(let i=0;i<G.tempHearts;i++){ drawHeartImg('temp', hx, hy, size); hx+=step; }
  // score (center) + best (under it)
  text('SCORE '+G.score, CONFIG.W/2, t+16, '#fff', 11);
  text('BEST '+SAVE.high, CONFIG.W/2, t+38, '#888', 7);
  // run coins (right, just left of the pause button) — aligned with the SCORE text baseline
  drawCoinCounter(CONFIG.W-46, t+16, G.runCoins, 11, 7, '#F5C518');
  // pause button (far top-right)
  if(!G.dead) pauseButton(CONFIG.W-22, t+18);
  // active timed power-up indicators (below the HUD bar): icon + full name + colored progress bar
  let iy=CONFIG.HUD_H+8;
  const BARW=120, BARH=12, ICONSZ=18;
  // [timer key, icon/color key, display name, max seconds]
  const tlist=[
    ['magnet','magnet','MAGNET',15],
    ['tiny','tiny','TINY',20],
    ['slowField','slowfield','SLOW FIELD',12],
    ['doublePoints','doublepoints','DOUBLE SCORE',20],
    ['ghost','ghost','GHOST',15],
  ];
  for(const [tkey,ikey,label,max] of tlist){ const t2=G.timers[tkey]; if(t2>0){
    const col=POWERUP_COLORS[ikey]||'#5BC8F5';
    const barX=CONFIG.W-12-BARW;
    const iconCx=barX-ICONSZ/2-6, iconCy=iy+BARH/2;
    // icon
    drawIcon(ikey, iconCx, iconCy, ICONSZ);
    // bar track
    ctx.fillStyle='rgba(0,0,0,0.45)'; roundRect(barX,iy,BARW,BARH,4); ctx.fill();
    // bar fill (power-up color)
    const denom = (G.timerPeak && G.timerPeak[tkey]>0) ? G.timerPeak[tkey] : max*60;
    const fillW=Math.max(0, Math.min(BARW, BARW*(t2/denom)));
    if(fillW>0){ ctx.fillStyle=col; roundRect(barX,iy,fillW,BARH,4); ctx.fill(); }
    // name label centered on the bar, with a readable outline
    setFont(6); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillText(label, barX+BARW/2+0.5, iy+BARH/2+1.5);
    ctx.fillStyle='#fff'; ctx.fillText(label, barX+BARW/2, iy+BARH/2+1);
    iy+=BARH+6;
  }}
}
function pauseButton(cx,cy){
  buttons.push({x:cx-16,y:cy-16,w:32,h:32,fn:()=>pauseGame()});
  ctx.fillStyle='rgba(0,0,0,0.4)'; roundRect(cx-15,cy-15,30,30,6); ctx.fill();
  ctx.fillStyle='#e8e8f0'; ctx.fillRect(cx-7,cy-8,5,16); ctx.fillRect(cx+2,cy-8,5,16);
}
function pauseGame(){ if(state==='playing' && !G.dead){ state='paused'; Audio_.stopMusic(); } }
function resumeGame(){ state='playing'; G.countdown=180; G.countdownLabel='RESUME'; Audio_.startMusic(); }
function drawPaused(){
  drawWorld();
  ctx.fillStyle='rgba(5,2,12,0.74)'; ctx.fillRect(0,0,VW,CONFIG.H);
  ctx.save(); ctx.translate(OX,0); buttons=[];
  text('PAUSED', CONFIG.W/2, CONFIG.H/2-90, '#F5C518', 22);
  button('RESUME', 50, CONFIG.H/2-30, CONFIG.W-100, 56, DRAGONS[SAVE.dragon].color, '#fff', ()=>{ Audio_.click(); resumeGame(); }, {fs:16,r:12});
  button('MAIN MENU', 50, CONFIG.H/2+44, CONFIG.W-100, 48, '#3A1A5A', '#F5C518', ()=>{ Audio_.click(); Audio_.stopMusic(); state='select'; }, {fs:13,r:10});
  ctx.restore();
}

let menuDragons=[], menuStars=null;
function drawMenuBG(w){
  // night sky
  const g=ctx.createLinearGradient(0,0,0,CONFIG.H);
  g.addColorStop(0,'#1b0e36'); g.addColorStop(0.45,'#27124c'); g.addColorStop(1,'#0b0820');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,CONFIG.H);
  // stars
  if(!menuStars){ menuStars=[]; for(let i=0;i<70;i++) menuStars.push({x:Math.random(),y:Math.random()*0.5,p:Math.random()*6.28,s:Math.random()<0.25?2:1}); }
  for(const s of menuStars){ const tw=0.5+0.5*Math.sin(TICK*0.05+s.p); ctx.globalAlpha=0.25+0.6*tw; ctx.fillStyle='#fff'; ctx.fillRect(Math.round(s.x*w),Math.round(s.y*CONFIG.H),s.s,s.s); }
  ctx.globalAlpha=1;
  // moon image — raised above the taller logo
  drawMoon(Math.round(w*0.82), Math.round(CONFIG.H*0.07), 30);
  // parallax pixel hills
  menuHills(w,'#241a44', 0.18, 150, 7);
  menuHills(w,'#33245e', 0.42, 95, 13);
  menuHills(w,'#0f0a26', 0.0, 46, 0);   // foreground floor

function carouselInit(){
  // center the currently-selected dragon on entry
  const i = CAROUSEL.indexOf(SAVE.dragon); if(i>=0) carIndex=i;
  carScroll = carIndex*(CARD_W+CARD_GAP);
}
// a small filled pixel-art circle (blocky, no anti-aliasing) centered at (cx,cy).
// r = radius in grid cells, px = size of each cell in screen pixels.
function pixelDot(cx,cy,r,color,px){
  px = px||2;
  ctx.fillStyle=color;
  for(let gy=-r;gy<=r;gy++){
    for(let gx=-r;gx<=r;gx++){
      if(gx*gx+gy*gy <= r*r + r*0.4){ ctx.fillRect(Math.round(cx+gx*px), Math.round(cy+gy*px), px, px); }
    }
  }
}
// hollow pixel-art circle outline: cells whose distance from center falls in the ring band
function pixelRing(cx,cy,rOuter,color,px,band){
  px = px||3; band = band||1;       // band = ring thickness in grid cells
  const rо=rOuter, ri=rOuter-band;
  ctx.fillStyle=color;
  for(let gy=-rо;gy<=rо;gy++){
    for(let gx=-rо;gx<=rо;gx++){
      const d2=gx*gx+gy*gy;
      if(d2 <= rо*rо + rо*0.4 && d2 >= ri*ri - ri*0.4){
        ctx.fillRect(Math.round(cx+gx*px), Math.round(cy+gy*px), px, px);
      }
    }
  }
}
function drawDragonCarousel(){
  const stride = CARD_W+CARD_GAP;
  const target = carIndex*stride;
  if(!carDrag) carScroll += (target-carScroll)*0.2;   // ease toward snap point
  const cxCenter = CONFIG.W/2;
  // clip region so cards don't bleed over the stats / buttons
  ctx.save();
  ctx.beginPath(); ctx.rect(0, CARD_Y-6, CONFIG.W, CARD_H+12); ctx.clip();
  for(let i=0;i<CAROUSEL.length;i++){
    const cardCx = cxCenter + i*stride - carScroll;
    const x = Math.round(cardCx - CARD_W/2);
    if(x > CONFIG.W+20 || x+CARD_W < -20) continue;  // offscreen cull
    if(CAROUSEL[i]==='soon') drawComingSoonCard(x, CARD_Y, CARD_W, CARD_H);
    else drawDragonCard(CAROUSEL[i], x, CARD_Y, CARD_W, CARD_H);
  }
  ctx.restore();
  // left / right arrows
  if(carIndex>0) arrowButton(20, CARD_Y+CARD_H/2, false, ()=>{ carIndex--; Audio_.click(); });
  if(carIndex<CAROUSEL.length-1) arrowButton(CONFIG.W-20, CARD_Y+CARD_H/2, true, ()=>{ carIndex++; Audio_.click(); });
  // dots (pixel-art circles)
  const dotY = CARD_Y+CARD_H+20, dn=CAROUSEL.length, dw=22;
  for(let i=0;i<dn;i++){ pixelDot(Math.round(cxCenter-(dn-1)*dw/2+i*dw), dotY, 3, i===carIndex?'#F5C518':'#3A2F55', 2); }

function drawBiomePreview(b,x,y,w,h){
  ctx.save();
  roundRect(x,y,w,h,6); ctx.clip();
  const g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,b.bgTop); g.addColorStop(1,b.bgBot);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  // distant ridge
  ctx.fillStyle=b.silFar;
  for(let i=0;i<w;i+=4){ const hh=5+(Math.sin(i*0.5+b.name.length)+1)*4; ctx.fillRect(x+i, y+h-10-hh, 4, hh+10); }
  ctx.fillStyle=b.silNear; ctx.fillRect(x,y+h-8,w,8);   // ground
  const gy=y+h-8;
  if(b.tip==='spike'){                 // cave: stalactites + stalagmites
    for(let i=0;i<3;i++){ const fx=Math.round(x+14+i*((w-22)/2));
      for(let k=0;k<4;k++){ const ww=9-k*2; ctx.fillStyle=k?b.oMid:b.oLight; ctx.fillRect(fx-((ww/2)|0), y+k*4, ww,4); }
      for(let k=0;k<4;k++){ const ww=9-k*2; ctx.fillStyle=b.oMid; ctx.fillRect(fx-((ww/2)|0), gy-(k+1)*4, ww,4); ctx.fillStyle=b.oLight; ctx.fillRect(fx-((ww/2)|0), gy-(k+1)*4,2,4); } }
  } else if(b.tip==='forest'){         // trees + glowing mushrooms
    for(let i=0;i<2;i++){ const fx=Math.round(x+26+i*(w-52));
      ctx.fillStyle=b.oDark; ctx.fillRect(fx-2, gy-22, 5, 22);
      ctx.fillStyle=b.oMid;  ctx.fillRect(fx-11, gy-36, 24, 16);
      ctx.fillStyle=b.oLight;ctx.fillRect(fx-11, gy-36, 24, 4); }
    ctx.fillStyle=b.accent; for(let i=0;i<3;i++){ const mx=x+12+i*((w-18)/2); ctx.fillRect(mx, gy-6,6,5); ctx.fillRect(mx+1, gy-2,4,2); }
  } else if(b.tip==='ice'){            // crystals + sparkle
    for(let i=0;i<4;i++){ const fx=Math.round(x+13+i*((w-20)/3));
      for(let k=0;k<5;k++){ const ww=Math.max(1,9-k*2); ctx.fillStyle=k%2?b.oMid:b.oLight; ctx.fillRect(fx-((ww/2)|0), gy-(k+1)*4, ww,4); } }
    ctx.fillStyle=b.acc2; for(let i=0;i<5;i++) ctx.fillRect(x+8+i*16, y+8+(i%3)*6, 2,2);
  } else if(b.tip==='ruins'){          // broken pillars
    for(let i=0;i<3;i++){ const fx=Math.round(x+18+i*((w-30)/2));
      ctx.fillStyle=b.oMid;   ctx.fillRect(fx-5, gy-26, 12, 26);
      ctx.fillStyle=b.oLight; ctx.fillRect(fx-5, gy-26, 3, 26);
      ctx.fillStyle=b.accent; ctx.fillRect(fx-6, gy-28, 14, 3); }
  } else {                             // lava: spires + molten pool
    const lg=ctx.createLinearGradient(0,gy-3,0,y+h); lg.addColorStop(0,b.accent); lg.addColorStop(1,b.acc2);
    ctx.fillStyle=lg; ctx.fillRect(x,gy-2,w,h);
    for(let i=0;i<3;i++){ const fx=Math.round(x+18+i*((w-30)/2));
      for(let k=0;k<5;k++){ const ww=Math.max(2,11-k*2); ctx.fillStyle=b.oMid; ctx.fillRect(fx-((ww/2)|0), y+6+k*4, ww,4); }
      ctx.fillStyle=b.accent; ctx.fillRect(fx-1, y+6, 2, 9); }
    ctx.fillStyle=b.acc2; for(let i=0;i<4;i++) ctx.fillRect(x+10+i*20, y+6+(i%2)*4, 2,2);
  }
  ctx.restore();
  ctx.strokeStyle='#2A2040'; ctx.lineWidth=2; roundRect(x,y,w,h,6); ctx.stroke();
}

//  MAIN LOOP
// ============================================================
let TICK=0;
let prevState=null;
function frame(){
  TICK++;
  ctx.setTransform(RSCALE,0,0,RSCALE,0,0);
  // screen shake (gameplay only — never on game-over / menu overlays)
  if(shake>0.5 && state==='playing'){
    ctx.translate(rnd(-shake,shake), rnd(-shake,shake));
  }
  ctx.clearRect(-60,-60,VW+120,CONFIG.H+120);

  if(state==='playing'){ tickInvuln(); update(); drawWorld(); }
  else if(state==='paused'){ drawPaused(); }
  else if(state==='milestone'){ drawMilestone(); }
  else if(state==='gameover'){ drawGameOver(); }
  else if(state==='gameover_name'){ drawGameOverName(); }
  else {
    // pure menus: full-width backdrop, content in the centered iPhone column
    ctx.fillStyle='#0D0618'; ctx.fillRect(0,0,VW,CONFIG.H);
    if(OX>0){ ctx.fillStyle='#0A041A'; ctx.fillRect(0,0,OX,CONFIG.H); ctx.fillRect(OX+CONFIG.W,0,VW-OX-CONFIG.W,CONFIG.H); }
    ctx.save(); ctx.translate(OX,0);
    if(state==='select') drawSelect();
    else if(state==='envselect') drawEnvSelect();
    else if(state==='shop') drawShop();
    else if(state==='settings') drawSettings();
    ctx.restore();
  }

  // ---- centralized music manager ----
  // Decide which track should be playing based on the current screen.
  // 'title'  -> select / envselect / (settings opened from the main menu)
  // 'shop'   -> shop
  // 'biome'  -> playing / paused / milestone (handled by startRun/resumeGame)
  // 'none'   -> gameover, gameover_name, settings opened from game over
  if(Audio_.ctx && !SAVE.muted && Audio_.ctx.state==='running'){
    let want='none';
    if(state==='select' || state==='envselect') want='title';
    else if(state==='shop') want='shop';
    else if(state==='settings') want = (settingsReturn==='gameover') ? 'none' : 'title';
    else if(state==='playing' || state==='paused' || state==='milestone') want='biome';
    // apply: start the wanted track, stop the others (biome music is managed elsewhere)
    if(want==='title'){ Audio_.stopShopMusic(); Audio_.startTitleMusic(); }
    else if(want==='shop'){ Audio_.stopTitleMusic(); Audio_.startShopMusic(); }
    else if(want==='none'){ Audio_.stopTitleMusic(); Audio_.stopShopMusic(); }
    else if(want==='biome'){ Audio_.stopTitleMusic(); Audio_.stopShopMusic(); }
  }
  if(state==='select' && prevState!=='select') carouselInit();
  prevState=state;

  requestAnimationFrame(frame);
}
